# Re//wire
title: "Re//wire"
description: "Re&hairsp;&hairsp;∕∕&hairsp;wire, the research collective."
url: "https://rewire.red"
baseurl: ""

# Build settings
markdown: kramdown
permalink: pretty

# Include pages from _pages directory
include:
  - _pages

# Collections (if needed later)
collections_dir: .

# Default front matter
defaults:
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "default"

# Plugins
plugins:
  - jekyll-seo-tag
