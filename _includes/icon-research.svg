<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Network of connected nodes: ideas linking people -->
  <!-- Outer nodes -->
  <circle cx="100" cy="20" r="12" fill="none" stroke="currentColor" stroke-width="3"/>
  <circle cx="25" cy="80" r="12" fill="none" stroke="currentColor" stroke-width="3"/>
  <circle cx="175" cy="80" r="12" fill="none" stroke="currentColor" stroke-width="3"/>
  <circle cx="45" cy="165" r="12" fill="none" stroke="currentColor" stroke-width="3"/>
  <circle cx="155" cy="165" r="12" fill="none" stroke="currentColor" stroke-width="3"/>
  <!-- Central node, slightly larger -->
  <circle cx="100" cy="100" r="16" fill="none" stroke="currentColor" stroke-width="3"/>
  <circle cx="100" cy="100" r="5" fill="currentColor"/>
  <!-- Connections to center -->
  <line x1="100" y1="32" x2="100" y2="84" stroke="currentColor" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="36" y1="85" x2="84" y2="97" stroke="currentColor" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="164" y1="85" x2="116" y2="97" stroke="currentColor" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="52" y1="156" x2="88" y2="112" stroke="currentColor" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="148" y1="156" x2="112" y2="112" stroke="currentColor" stroke-width="2" stroke-dasharray="5 4"/>
  <!-- Cross connections -->
  <line x1="35" y1="72" x2="90" y2="25" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <line x1="165" y1="72" x2="110" y2="25" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <line x1="55" y1="160" x2="145" y2="160" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
</svg>
